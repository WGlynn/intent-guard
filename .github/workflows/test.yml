name: forge

on:
  push:
    branches: [main, "fix/**", "feat/**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show versions
        run: |
          forge --version
          solc --version || true

      - name: Build (default profile, no --via-ir)
        run: forge build --sizes

      - name: Build (via-ir profile, parity check)
        run: forge build --via-ir

      - name: Run tests
        run: forge test -vv

      - name: Run tests (via-ir)
        run: forge test --via-ir

  slither:
    name: slither static analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry (for slither remappings)
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        continue-on-error: true
        with:
          target: contracts/
          slither-args: --exclude-dependencies --exclude-low --exclude-informational --filter-paths "lib/"
          fail-on: high
